name: Test

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mcp/badass-skills-server/package-lock.json

      - name: Install MCP server deps
        working-directory: mcp/badass-skills-server
        run: npm ci

      - name: Run tests (MCP + workflow smoke)
        run: npm test
